<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Activo - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-success text-white rounded-top-4 p-4">
                        <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i> Crear Nuevo Activo</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="crearActivoForm" onsubmit="return handleCrearActivo(event)">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Código <span class="text-danger">*</span></label>
                                <input type="text" id="codigoActivo" class="form-control" placeholder="Ej: AAPL" required />
                                <div class="invalid-feedback">El código es obligatorio</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
                                <input type="text" id="nombreActivo" class="form-control" placeholder="Ej: Apple Inc." required />
                                <div class="invalid-feedback">El nombre es obligatorio</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tipo <span class="text-danger">*</span></label>
                                <select id="tipoActivo" class="form-select" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="acción">Acción</option>
                                    <option value="criptomoneda">Criptomoneda</option>
                                    <option value="ETF">ETF</option>
                                    <option value="bono">Bono</option>
                                </select>
                                <div class="invalid-feedback">Seleccione un tipo</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Precio Actual <span class="text-danger">*</span></label>
                                <input type="number" id="precioActivo" class="form-control" placeholder="0.00" step="0.01" min="0.01" required />
                                <div class="invalid-feedback">El precio debe ser mayor a 0</div>
                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-success btn-lg px-5">
                                    <i class="fas fa-save me-2"></i> Crear Activo
                                </button>
                                <a href="admin-activos.html" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="fas fa-times me-2"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
    <script>
       fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        function handleCrearActivo(event) {
            event.preventDefault();
            const codigo = document.getElementById('codigoActivo').value.trim();
            const nombre = document.getElementById('nombreActivo').value.trim();
            const tipo = document.getElementById('tipoActivo').value;
            const precio = parseFloat(document.getElementById('precioActivo').value);

            if (!codigo || !nombre || !tipo || !precio || precio <= 0) {
                mostrarToast('Complete todos los campos correctamente', 'error');
                return false;
            }

            mostrarToast(`Activo ${nombre} creado exitosamente`, 'success');
            setTimeout(() => window.location.href = 'admin-activos.html', 1500);
            return false;
        }
    </script>
</body>
</html>
