<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-file-alt me-2 text-primary"></i> Reportes de Investigación</h4>
            <div class="d-flex gap-2">
                <input type="text" id="buscarReporte" class="form-control" placeholder="Buscar por título..." oninput="filtrarReportes(this.value)" />
                <select id="filtroCategoriaReporte" class="form-select" style="width: auto;" onchange="filtrarReportes(document.getElementById('buscarReporte').value)">
                    <option value="">Todas las categorías</option>
                    <option value="Análisis Fundamental">Análisis Fundamental</option>
                    <option value="Análisis Técnico">Análisis Técnico</option>
                    <option value="Análisis Sectorial">Análisis Sectorial</option>
                    <option value="Educativo">Educativo</option>
                    <option value="General">General</option>
                </select>
            </div>
        </div>

        <!-- Contenedor de reportes -->
        <div id="contenedorReportes"></div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        // ============================================
        // 1. CARGAR HEADER Y FOOTER
        // ============================================
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('header').innerHTML = data;
                if (typeof cargarMenuPorRol === 'function') {
                    cargarMenuPorRol();
                }
                if (typeof configurarLogo === 'function') {
                    configurarLogo();
                }
            });

        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('footer').innerHTML = data;
            });

        // ============================================
        // 2. FUNCIÓN PARA RENDERIZAR REPORTES (LOCAL)
        // ============================================
        function renderizarReportesLocal(reportes) {
            var container = document.getElementById('contenedorReportes');
            if (!container) {
                console.error('❌ Contenedor no encontrado');
                return;
            }
            
            console.log('📄 Renderizando reportes localmente:', reportes);
            
            if (!reportes || reportes.length === 0) {
                container.innerHTML = '<div class="alert alert-info text-center">No hay reportes publicados.</div>';
                return;
            }
            
            var html = '<div class="row g-4">';
            for (var i = 0; i < reportes.length; i++) {
                var r = reportes[i];
                if (r.estado !== 'publicado') continue;
                
                html += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="fw-bold">${r.titulo}</h5>
                                    <span class="badge bg-info">${r.categoria}</span>
                                </div>
                                <p class="text-muted small">${r.resumen || 'Sin resumen'}</p>
                                <hr />
                                <div class="d-flex justify-content-between text-muted small">
                                    <span><i class="fas fa-user me-1"></i> ${r.autor}</span>
                                    <span><i class="fas fa-calendar me-1"></i> ${new Date(r.fecha_publicacion).toLocaleDateString()}</span>
                                    <span><i class="fas fa-eye me-1"></i> ${r.visualizaciones || 0}</span>
                                </div>
                                <button class="btn btn-sm btn-primary w-100 mt-2" onclick="verDetalleReporte('${r.id}')">
                                    <i class="fas fa-eye me-1"></i> Ver Reporte
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            
            container.innerHTML = html || '<div class="alert alert-info text-center">No hay reportes publicados.</div>';
            console.log('✅ Reportes renderizados correctamente');
        }

        // ============================================
        // 3. FUNCIÓN PARA CARGAR REPORTES (LOCAL)
        // ============================================
        async function cargarReportesLocal() {
            console.log('📄 Cargando reportes desde API...');
            try {
                var response = await fetch('http://127.0.0.1:8000/api/reportes/');
                if (!response.ok) {
                    throw new Error('Error HTTP: ' + response.status);
                }
                var data = await response.json();
                console.log('✅ Reportes recibidos:', data);
                renderizarReportesLocal(data);
            } catch (error) {
                console.error('❌ Error cargando reportes:', error);
                var container = document.getElementById('contenedorReportes');
                if (container) {
                    container.innerHTML = '<div class="alert alert-danger text-center">Error cargando reportes: ' + error.message + '</div>';
                }
            }
        }

        // ============================================
        // 4. INICIALIZAR
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 REPORTES.HTML INICIALIZADO');
            
            // Forzar la creación del contenedor
            var container = document.getElementById('contenedorReportes');
            if (!container) {
                console.warn('⚠️ Contenedor no existe, creándolo...');
                container = document.createElement('div');
                container.id = 'contenedorReportes';
                container.className = 'mt-3';
                
                var main = document.querySelector('.container-fluid');
                if (main) {
                    main.appendChild(container);
                    console.log('✅ Contenedor creado');
                }
            }
            
            // Cargar reportes
            cargarReportesLocal();
            
            // Cargar bitácora
            if (typeof cargarBitacora === 'function') {
                cargarBitacora();
                renderizarBitacora();
            }
        });
    </script>
</body>
</html>
