<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Clientes - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
    <h4>
        <a href="admin-panel.html" class="text-decoration-none text-dark" id="logoAdminLink">
            <i class="fas fa-chart-line me-2 text-primary"></i> InvestCapital Hub
        </a>
        <span class="text-muted fs-6 ms-3">/ Gestión de Activos</span>
    </h4>
    <div>
        <button class="btn btn-success me-2" onclick="window.location.href='admin-activo-crear.html'">
            <i class="fas fa-plus me-1"></i> Nuevo Activo
        </button>
        <button class="btn btn-warning" onclick="actualizarPreciosMasivos()">
            <i class="fas fa-sync me-1"></i> Actualizar Precios
        </button>
    </div>
</div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombres</th>
                                <th>Apellidos</th>
                                <th>Identificación</th>
                                <th>Teléfono</th>
                                <th>Celular</th>
                                <th>Correo</th>
                                <th>Estado Civil</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaClientes">
                            <tr>
                                <td colspan="10" class="text-center text-muted py-4">
                                    <i class="fas fa-spinner fa-spin me-2"></i> Cargando datos...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="paginacionClientes"></div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
    <script>
    fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            cargarMenuPorRol();
            configurarLogo();
        });
    fetch('../components/footer.html')
        .then(res => res.text())
        .then(data => document.getElementById('footer').innerHTML = data);

    document.addEventListener('DOMContentLoaded', function() {
        cargarClientes();
        cargarBitacora();
        renderizarBitacora();
    });
</script>
</body>
</html>
