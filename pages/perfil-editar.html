<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Perfil - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-primary text-white rounded-top-4 p-4">
                        <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i> Editar Perfil</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="editarPerfilForm" onsubmit="return handleEditarPerfil(event)">
                            <input type="hidden" id="perfilIdHidden" />
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nombres <span class="text-danger">*</span></label>
                                    <input type="text" id="perfilNombresInput" class="form-control" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Apellidos <span class="text-danger">*</span></label>
                                    <input type="text" id="perfilApellidosInput" class="form-control" required />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Identificación <span class="text-danger">*</span></label>
                                    <input type="text" id="perfilIdentificacionInput" class="form-control" required />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <input type="text" id="perfilTelefonoInput" class="form-control" />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Celular <span class="text-danger">*</span></label>
                                    <input type="text" id="perfilCelularInput" class="form-control" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Correo <span class="text-danger">*</span></label>
                                    <input type="email" id="perfilCorreoInput" class="form-control" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Dirección</label>
                                    <input type="text" id="perfilDireccionInput" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Estado Civil <span class="text-danger">*</span></label>
                                    <select id="perfilEstadoCivilInput" class="form-select" required>
                                        <option value="soltero">Soltero/a</option>
                                        <option value="casado">Casado/a</option>
                                        <option value="divorciado">Divorciado/a</option>
                                        <option value="separado">Separado/a</option>
                                        <option value="unión libre">Unión Libre</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Estado <span class="text-danger">*</span></label>
                                    <select id="perfilEstadoInput" class="form-select" required>
                                        <option value="activo">Activo</option>
                                        <option value="inactivo">Inactivo</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                                <a href="perfil.html" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="fas fa-times me-2"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 <script src="../assets/js/app.js"></script>
    <script>
       fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        document.addEventListener('DOMContentLoaded', function() {
            const session = verificarSesion();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            fetch('../assets/data/datos.json')
                .then(res => res.json())
                .then(data => {
                    const cliente = data.clientes.find(c => c.correo === session.correo);
                    if (cliente) {
                        document.getElementById('perfilIdHidden').value = cliente.id;
                        document.getElementById('perfilNombresInput').value = cliente.nombres;
                        document.getElementById('perfilApellidosInput').value = cliente.apellidos;
                        document.getElementById('perfilIdentificacionInput').value = cliente.identificacion;
                        document.getElementById('perfilTelefonoInput').value = cliente.telefono || '';
                        document.getElementById('perfilCelularInput').value = cliente.celular;
                        document.getElementById('perfilCorreoInput').value = cliente.correo;
                        document.getElementById('perfilDireccionInput').value = cliente.direccion || '';
                        document.getElementById('perfilEstadoCivilInput').value = cliente.estadoCivil;
                        document.getElementById('perfilEstadoInput').value = cliente.estado;
                    }
                });
        });

        function handleEditarPerfil(event) {
            event.preventDefault();
            mostrarToast('Perfil actualizado exitosamente', 'success');
            setTimeout(() => window.location.href = 'perfil.html', 1500);
            return false;
        }
    </script>
</body>
</html>
