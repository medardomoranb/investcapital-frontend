<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-file-alt me-2 text-primary"></i> Reportes de Investigación</h4>
            <div class="d-flex gap-2">
                <input type="text" id="buscarReporte" class="form-control" placeholder="Buscar por título..." oninput="filtrarReportes(this.value)" />
                <select id="filtroCategoriaReporte" class="form-select" style="width: auto;" onchange="filtrarReportes(document.getElementById('buscarReporte').value)">
                    <option value="">Todas las categorías</option>
                    <option value="Análisis Fundamental">Análisis Fundamental</option>
                    <option value="Análisis Técnico">Análisis Técnico</option>
                    <option value="Análisis Sectorial">Análisis Sectorial</option>
                    <option value="Educativo">Educativo</option>
                    <option value="General">General</option>
                </select>
            </div>
        </div>

        <div class="row g-4" id="listaReportes">
            <div class="col-12 text-center text-muted py-4">
                <i class="fas fa-spinner fa-spin me-2"></i> Cargando reportes...
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
    <script>
      fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            cargarMenuPorRol();
            configurarLogo();
        });
    fetch('../components/footer.html')
        .then(res => res.text())
        .then(data => document.getElementById('footer').innerHTML = data);

    // ✅ CORRECTO: cargarReportes() NO cargarActivos()
    document.addEventListener('DOMContentLoaded', function() {
        cargarReportes();
        cargarBitacora();
        renderizarBitacora();
    });
    </script>
</body>
</html>
