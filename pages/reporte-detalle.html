<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Reporte - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 id="reporteTitulo"><i class="fas fa-file-pen me-2 text-primary"></i> Detalle de Reporte</h4>
            <a href="reportes.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg border-0 rounded-4" id="detalleReporte">
            <div class="card-body p-4">
                <div class="mb-3">
                    <h3 id="reporteDetalleTitulo">-</h3>
                    <div class="d-flex gap-3 text-muted">
                        <span><i class="fas fa-tag me-1"></i> <span id="reporteDetalleCategoria">-</span></span>
                        <span><i class="fas fa-user me-1"></i> <span id="reporteDetalleAutor">-</span></span>
                        <span><i class="fas fa-calendar me-1"></i> <span id="reporteDetalleFecha">-</span></span>
                        <span><i class="fas fa-eye me-1"></i> <span id="reporteDetalleVisualizaciones">-</span></span>
                    </div>
                </div>
                <hr />
                <h6><i class="fas fa-align-left me-2 text-primary"></i> Resumen</h6>
                <p id="reporteDetalleResumen" class="text-muted">-</p>
                <h6><i class="fas fa-file-lines me-2 text-primary"></i> Contenido</h6>
                <div id="reporteDetalleContenido" class="p-3 bg-light rounded"></div>

                <hr />

                <h6><i class="fas fa-link me-2 text-primary"></i> Activos Relacionados</h6>
                <div id="reporteActivosRelacionados" class="mt-2">
                    <p class="text-muted">No hay activos relacionados.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
    <script>
       fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
</body>
</html>
