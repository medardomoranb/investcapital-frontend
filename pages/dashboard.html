<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="header"></div>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-home me-2 text-primary"></i> Dashboard de Inversiones</h4>
            <button class="btn btn-sm btn-success" onclick="actualizarDashboard()">
                <i class="fas fa-sync me-1"></i> Actualizar Datos
            </button>
        </div>

        <!-- Resumen -->
        <div class="row g-4 mb-4" id="resumenDashboard">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100 bg-primary text-white">
                    <div class="card-body">
                        <h6 class="text-white-50">Valor Total Invertido</h6>
                        <h3 class="fw-bold" id="valorInvertido">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100 bg-success text-white">
                    <div class="card-body">
                        <h6 class="text-white-50">Valor Actual</h6>
                        <h3 class="fw-bold" id="valorActual">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100 bg-warning text-dark">
                    <div class="card-body">
                        <h6 class="text-dark-50">Ganancia/Pérdida</h6>
                        <h3 class="fw-bold" id="gananciaPerdida">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100 bg-info text-white">
                    <div class="card-body">
                        <h6 class="text-white-50">Portafolios Activos</h6>
                        <h3 class="fw-bold" id="totalPortafolios">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="row g-4 mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-chart-line me-2 text-primary"></i> Evolución del Portafolio</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary" onclick="cambiarPeriodoDashboard(7)">7D</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="cambiarPeriodoDashboard(30)">30D</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="cambiarPeriodoDashboard(90)">90D</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="chart-container" style="position: relative; height: 300px;">
                            <canvas id="graficoDashboard"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Barras + Pastel -->
        <div class="row g-4 mb-4">
            <div class="col-md-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-chart-bar me-2 text-primary"></i> Rendimiento por Activo</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container" style="position: relative; height: 200px;">
                            <canvas id="graficoBarrasDashboard"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-chart-pie me-2 text-primary"></i> Distribución por Tipo</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container" style="position: relative; height: 200px;">
                            <canvas id="graficoPastelDashboard"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bitácora -->
        <div class="row g-4 mt-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-history me-2 text-primary"></i> Bitácora de Acciones <span class="badge bg-primary ms-2" id="bitacoraContador">0</span></h5>
                        <button class="btn btn-sm btn-outline-danger" onclick="limpiarBitacora()"><i class="fas fa-trash me-1"></i> Limpiar</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="bitacoraContainer">
                            <div class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin me-2"></i> Cargando acciones...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        // ============================================
        // 1. CARGAR HEADER Y FOOTER
        // ============================================
        fetch('../components/header.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('header').innerHTML = data;
                if (typeof cargarMenuPorRol === 'function') cargarMenuPorRol();
                if (typeof configurarLogo === 'function') configurarLogo();
            });

        fetch('../components/footer.html')
            .then(function(res) { return res.text(); })
            .then(function(data) {
                document.getElementById('footer').innerHTML = data;
            });

        // ============================================
        // 2. VARIABLES GLOBALES
        // ============================================
        var graficoDashboard = null;
        var graficoBarrasDashboard = null;
        var graficoPastelDashboard = null;
        var periodoDashboard = 30;

        // ============================================
        // 3. FUNCIONES
        // ============================================

        async function cargarDashboardInversionista() {
            try {
                var session = JSON.parse(localStorage.getItem('session') || '{}');
                console.log('📊 Cargando dashboard para:', session);
                
                // Buscar cliente por correo
                var clientesRes = await fetch('http://127.0.0.1:8000/api/clientes/');
                var clientes = await clientesRes.json();
                var cliente = clientes.find(function(c) { return c.correo === session.correo; });
                
                if (!cliente) {
                    console.error('❌ Cliente no encontrado para:', session.correo);
                    mostrarToast('Cliente no encontrado', 'error');
                    return;
                }
                
                console.log('✅ Cliente encontrado:', cliente);
                
                // Cargar portafolios del cliente
                var portafoliosRes = await fetch('http://127.0.0.1:8000/api/portafolios/?cliente_id=' + cliente.id);
                var portafolios = await portafoliosRes.json();
                
                // Cargar activos
                var activosRes = await fetch('http://127.0.0.1:8000/api/activos/');
                var activos = await activosRes.json();
                
                console.log('📊 Portafolios:', portafolios.length);
                console.log('📊 Activos:', activos.length);
                
                // Actualizar tarjetas
                actualizarTarjetasDashboard(portafolios);
                
                // Crear gráficos
                crearGraficoDashboardLocal(portafolios);
                crearGraficoBarrasLocal(portafolios, activos);
                crearGraficoPastelLocal(portafolios);
                
            } catch (error) {
                console.error('❌ Error cargando dashboard:', error);
                mostrarToast('Error cargando datos del dashboard', 'error');
            }
        }

        function actualizarTarjetasDashboard(portafolios) {
            var valorInvertido = 0;
            var valorActual = 0;
            var portafoliosActivos = 0;
            
            for (var i = 0; i < portafolios.length; i++) {
                var p = portafolios[i];
                valorInvertido += p.valor_total_invertido || 0;
                valorActual += p.valor_actual_total || 0;
                if (p.estado === 'activo') portafoliosActivos++;
            }
            
            var ganancia = valorActual - valorInvertido;
            
            document.getElementById('valorInvertido').textContent = formatearMoneda(valorInvertido);
            document.getElementById('valorActual').textContent = formatearMoneda(valorActual);
            
            var gananciaEl = document.getElementById('gananciaPerdida');
            gananciaEl.textContent = formatearMoneda(ganancia);
            gananciaEl.className = 'fw-bold ' + (ganancia >= 0 ? 'text-success' : 'text-danger');
            
            document.getElementById('totalPortafolios').textContent = portafoliosActivos;
        }

        function crearGraficoDashboardLocal(portafolios) {
            var ctx = document.getElementById('graficoDashboard').getContext('2d');
            
            if (graficoDashboard) graficoDashboard.destroy();
            
            // Datos simulados
            var fechas = [];
            var precios = [];
            var precioBase = 10000;
            
            if (portafolios && portafolios.length > 0) {
                var totalActual = 0;
                for (var i = 0; i < portafolios.length; i++) {
                    totalActual += portafolios[i].valor_actual_total || 0;
                }
                precioBase = totalActual > 0 ? totalActual : 10000;
            }
            
            var precio = precioBase;
            var hoy = new Date();
            for (var j = periodoDashboard - 1; j >= 0; j--) {
                var variacion = (Math.random() * 4) - 2;
                precio = precio * (1 + variacion / 100);
                precios.push(Math.round(precio * 100) / 100);
                
                var fecha = new Date(hoy);
                fecha.setDate(fecha.getDate() - j);
                fechas.push(fecha.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }));
            }
            
            graficoDashboard = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fechas,
                    datasets: [{
                        label: 'Valor del Portafolio',
                        data: precios,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '$' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(0);
                                }
                            }
                        }
                    }
                }
            });
        }

        function crearGraficoBarrasLocal(portafolios, activos) {
            var ctx = document.getElementById('graficoBarrasDashboard').getContext('2d');
            
            if (graficoBarrasDashboard) graficoBarrasDashboard.destroy();
            
            var labels = ['AAPL', 'GOOGL', 'MSFT', 'BTC-USD', 'ETH-USD', 'SPY'];
            var rendimientos = [];
            var colores = ['#0d6efd', '#6610f2', '#d63384', '#dc3545', '#fd7e14', '#198754'];
            
            for (var i = 0; i < labels.length; i++) {
                var rend = (Math.random() * 30) - 10;
                rendimientos.push(Math.round(rend * 10) / 10);
            }
            
            graficoBarrasDashboard = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Rendimiento %',
                        data: rendimientos,
                        backgroundColor: colores,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        function crearGraficoPastelLocal(portafolios) {
            var ctx = document.getElementById('graficoPastelDashboard').getContext('2d');
            
            if (graficoPastelDashboard) graficoPastelDashboard.destroy();
            
            var tipos = ['Acciones', 'Criptomonedas', 'ETFs', 'Bonos'];
            var valores = [35, 30, 20, 15];
            var colores = ['#0d6efd', '#198754', '#ffc107', '#dc3545'];
            
            graficoPastelDashboard = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: tipos,
                    datasets: [{
                        data: valores,
                        backgroundColor: colores,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'circle',
                                padding: 15
                            }
                        }
                    },
                    cutout: '65%'
                }
            });
        }

        function cambiarPeriodoDashboard(dias) {
            periodoDashboard = dias;
            cargarDashboardInversionista();
        }

        async function actualizarDashboard() {
            mostrarToast('🔄 Actualizando dashboard...', 'info');
            await cargarDashboardInversionista();
            registrarAccion('Actualización Dashboard', 'El usuario actualizó el dashboard', '');
            mostrarToast('✅ Dashboard actualizado', 'success');
        }

        // ============================================
        // 4. INICIALIZAR
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DASHBOARD INICIALIZADO');
            cargarDashboardInversionista();
            cargarBitacora();
            renderizarBitacora();
        });
    </script>
</body>
</html>
