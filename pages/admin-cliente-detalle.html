<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Cliente - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-user me-2 text-primary"></i> Detalle de Cliente</h4>
            <a href="admin-clientes.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <h6 class="text-muted border-bottom pb-2">Información Personal</h6>
                        <p><strong>ID:</strong> <span id="clienteDetalleId" class="badge bg-secondary">-</span></p>
                        <p><strong>Nombres:</strong> <span id="clienteDetalleNombres">-</span></p>
                        <p><strong>Apellidos:</strong> <span id="clienteDetalleApellidos">-</span></p>
                        <p><strong>Identificación:</strong> <span id="clienteDetalleIdentificacion">-</span></p>
                        <p><strong>Fecha Registro:</strong> <span id="clienteDetalleFechaRegistro">-</span></p>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-muted border-bottom pb-2">Contacto</h6>
                        <p><strong>Teléfono:</strong> <span id="clienteDetalleTelefono">-</span></p>
                        <p><strong>Celular:</strong> <span id="clienteDetalleCelular">-</span></p>
                        <p><strong>Correo:</strong> <span id="clienteDetalleCorreo">-</span></p>
                        <p><strong>Dirección:</strong> <span id="clienteDetalleDireccion">-</span></p>
                    </div>
                    <div class="col-12">
                        <h6 class="text-muted border-bottom pb-2">Estado</h6>
                        <p><strong>Estado Civil:</strong> <span id="clienteDetalleEstadoCivil">-</span></p>
                        <p><strong>Estado:</strong> <span id="clienteDetalleEstado">-</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script src="../assets/js/app.js"></script>
    <script>
        fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        document.addEventListener('DOMContentLoaded', function() {
            const clienteData = localStorage.getItem('clienteDetalle');
            if (!clienteData) {
                window.location.href = 'admin-clientes.html';
                return;
            }
            const cliente = JSON.parse(clienteData);
            document.getElementById('clienteDetalleId').textContent = cliente.id;
            document.getElementById('clienteDetalleNombres').textContent = cliente.nombres;
            document.getElementById('clienteDetalleApellidos').textContent = cliente.apellidos;
            document.getElementById('clienteDetalleIdentificacion').textContent = cliente.identificacion;
            document.getElementById('clienteDetalleTelefono').textContent = cliente.telefono || 'No registrado';
            document.getElementById('clienteDetalleCelular').textContent = cliente.celular;
            document.getElementById('clienteDetalleCorreo').textContent = cliente.correo;
            document.getElementById('clienteDetalleDireccion').textContent = cliente.direccion || 'No registrada';
            document.getElementById('clienteDetalleEstadoCivil').textContent = cliente.estadoCivil;
            document.getElementById('clienteDetalleEstado').innerHTML = `<span class="badge ${cliente.estado === 'activo' ? 'bg-success' : 'bg-danger'}">${cliente.estado}</span>`;
            document.getElementById('clienteDetalleFechaRegistro').textContent = new Date(cliente.fecha_registro).toLocaleString();
        });
    </script>
</body>
</html>
