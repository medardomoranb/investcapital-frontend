<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Administración - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container-fluid px-4 py-4">
        <h4 class="mb-4"><i class="fas fa-tachometer-alt me-2 text-primary"></i> Panel de Administración</h4>

        <div class="row g-4 mb-4" id="estadisticasAdmin">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="text-muted">Total Clientes</h6>
                        <h3 class="fw-bold" id="totalClientes">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="text-muted">Clientes Activos</h6>
                        <h3 class="fw-bold text-success" id="clientesActivos">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="text-muted">Portafolios</h6>
                        <h3 class="fw-bold text-primary" id="totalPortafoliosAdmin">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="text-muted">Transacciones</h6>
                        <h3 class="fw-bold text-info" id="totalTransaccionesAdmin">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-users fs-1 text-primary"></i>
                        <h5 class="mt-2">Clientes</h5>
                        <a href="admin-clientes.html" class="btn btn-primary btn-sm">Gestionar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-chart-bar fs-1 text-success"></i>
                        <h5 class="mt-2">Activos</h5>
                        <a href="admin-activos.html" class="btn btn-success btn-sm">Gestionar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-file-alt fs-1 text-warning"></i>
                        <h5 class="mt-2">Reportes</h5>
                        <a href="admin-reportes.html" class="btn btn-warning btn-sm">Gestionar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
   <script>
    fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            cargarMenuPorRol();
            configurarLogo();
        });
    fetch('../components/footer.html')
        .then(res => res.text())
        .then(data => document.getElementById('footer').innerHTML = data);

    // Cargar estadísticas al cargar la página
    document.addEventListener('DOMContentLoaded', function() {
        cargarEstadisticasAdmin();
        cargarBitacora();
        renderizarBitacora();
    });
</script>
</body>
</html>
