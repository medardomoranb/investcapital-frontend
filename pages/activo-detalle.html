<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Activo - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 id="activoTitulo"><i class="fas fa-chart-simple me-2 text-primary"></i> Detalle de Activo</h4>
            <a href="activos.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg border-0 rounded-4" id="detalleActivo">
            <div class="card-body p-4">
                <div class="row g-4" id="infoActivo">
                    <div class="col-md-6">
                        <p><strong>Código:</strong> <span id="detalleCodigo" class="badge bg-primary">-</span></p>
                        <p><strong>Nombre:</strong> <span id="detalleNombre">-</span></p>
                        <p><strong>Tipo:</strong> <span id="detalleTipo">-</span></p>
                        <p><strong>Estado:</strong> <span id="detalleEstado">-</span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Precio Actual:</strong> <span id="detallePrecio" class="fs-3 fw-bold">-</span></p>
                        <p><strong>Variación Diaria:</strong> <span id="detalleVariacionDiaria">-</span></p>
                        <p><strong>Variación Semanal:</strong> <span id="detalleVariacionSemanal">-</span></p>
                        <p><strong>Variación Mensual:</strong> <span id="detalleVariacionMensual">-</span></p>
                        <p><strong>Variación Anual:</strong> <span id="detalleVariacionAnual">-</span></p>
                    </div>
                </div>

                <div class="mt-4">
                    <button class="btn btn-success" onclick="comprarActivo()">
                        <i class="fas fa-cart-plus me-2"></i> Comprar Activo
                    </button>
                </div>

                <hr />

                <h5><i class="fas fa-file-alt me-2 text-primary"></i> Reportes Relacionados</h5>
                <div id="reportesRelacionados" class="mt-3">
                    <p class="text-muted">No hay reportes relacionados con este activo.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
       fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
</body>
</html>
