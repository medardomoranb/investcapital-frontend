<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vender Activo - InvestCapital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

    <div id="header"></div>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-danger text-white rounded-top-4 p-4">
                        <h4 class="mb-0"><i class="fas fa-minus-circle me-2"></i> Vender Activo</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="venderActivoForm" onsubmit="return handleVenderActivo(event)">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Activo</label>
                                <p class="fw-bold" id="activoVentaSeleccionado">Cargando...</p>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Cantidad Disponible</label>
                                <p class="fw-bold" id="cantidadDisponibleVenta">-</p>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Precio Actual</label>
                                <p class="fs-4 fw-bold text-success" id="precioActualVenta">-</p>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Cantidad a Vender <span class="text-danger">*</span></label>
                                <input type="number" id="cantidadVenta" class="form-control" placeholder="Ingrese la cantidad" min="0.00000001" step="any" required />
                                <div class="invalid-feedback">La cantidad debe ser mayor a 0 y no superar la disponible</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Monto Total</label>
                                <p class="fs-4 fw-bold" id="montoTotalVenta">$0.00</p>
                            </div>
                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn btn-danger btn-lg px-5">
                                    <i class="fas fa-check me-2"></i> Confirmar Venta
                                </button>
                                <a href="portafolio-detalle.html" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="fas fa-times me-2"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
    <script>
        fetch('../components/header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;
            // 🔥 IMPORTANTE: Ejecutar cargarMenuPorRol() DESPUÉS de cargar el header
            cargarMenuPorRol();
        });
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
</body>
</html>
