<!-- V-06: Tarjeta de Portafolio -->
<div class="card border-0 shadow-sm h-100">
    <div class="card-body">
        <div class="d-flex justify-content-between">
            <h5 class="fw-bold" id="tarjetaPortafolioNombre">-</h5>
            <span class="badge" id="tarjetaPortafolioEstado">-</span>
        </div>
        <p class="text-muted small" id="tarjetaPortafolioDescripcion">-</p>
        <hr />
        <div class="d-flex justify-content-between">
            <span class="text-muted">Valor:</span>
            <span class="fw-bold" id="tarjetaPortafolioValor">-</span>
        </div>
        <div class="d-flex justify-content-between">
            <span class="text-muted">Rendimiento:</span>
            <span id="tarjetaPortafolioRendimiento">-</span>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary" onclick="verDetallePortafolio()">
                <i class="fas fa-eye me-1"></i> Ver
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="editarPortafolio()">
                <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-outline-warning" onclick="archivarPortafolio()">
                <i class="fas fa-archive"></i>
            </button>
        </div>
    </div>
</div>
